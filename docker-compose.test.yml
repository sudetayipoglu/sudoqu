services:
  backend-test:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    container_name: sudoqu-backend-test

  frontend-test:
    build: ./frontend
    ports:
      - "3001:3000"
    container_name: sudoqu-frontend-test
    depends_on:
      - backend-test
